name: Discover new integrations

# Runs the discovery script every Monday, merges any proposals, and commits the
# generated catalog changes directly to main.
#
# Sources:
#   - github.com/backblaze-labs/* (public, non-archived repos)
#   - github.com/backblaze-b2-samples/* (public, non-archived repos)
#   - github.com/backblaze-labs/demand-side-ai#5 (upstream-integration tracker)
#
# The tracker repo is private. To access it on CI, add a `LABS_DISCOVERY_PAT`
# secret (fine-grained PAT with read access to demand-side-ai). Without it,
# public-org listings still work; the tracker is silently skipped.
#
# Conventions for upstream metadata: see ../../CONVENTIONS.md

on:
  schedule:
    - cron: "0 8 * * 1" # 08:00 UTC every Monday
  workflow_dispatch:

permissions:
  actions: write
  contents: write

jobs:
  discover:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ github.token }}

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"

      - run: npm ci

      - name: Run discovery
        env:
          GH_TOKEN: ${{ secrets.LABS_DISCOVERY_PAT || secrets.GITHUB_TOKEN }}
        run: npm run discover

      - name: Merge proposals into labs.json
        id: merge
        run: |
          if [[ ! -f src/data/labs.discovered.json ]]; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          npm run merge-discovered
          if [[ -z "$(git status --porcelain src/data/labs.json)" ]]; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push if changed
        id: commit
        if: steps.merge.outputs.has_changes == 'true'
        env:
          GIT_AUTHOR_NAME: ${{ vars.BOT_NAME || 'github-actions[bot]' }}
          GIT_AUTHOR_EMAIL: ${{ vars.BOT_EMAIL || '41898282+github-actions[bot]@users.noreply.github.com' }}
        run: |
          git config user.name  "$GIT_AUTHOR_NAME"
          git config user.email "$GIT_AUTHOR_EMAIL"
          git add src/data/labs.json
          git commit -m "chore(catalog): weekly discovery"
          git push
          echo "committed=true" >> "$GITHUB_OUTPUT"

      - name: Deploy site if catalog changed
        if: steps.commit.outputs.committed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run deploy.yml --ref main
