name: CI

# Runs on every pull request and push (except main, which is covered by deploy.yml).
# Dependabot PRs are intentionally skipped to avoid spending CI minutes on
# automated update branches that are reviewed and consolidated manually.
# Single job: lint + format + typecheck + JSON-schema validate + build smoke.
# Catches regressions before they hit main.

on:
  pull_request:
  push:
    branches-ignore: [main, "dependabot/**"]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    if: ${{ github.actor != 'dependabot[bot]' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"

      - run: npm ci

      - name: Run checks (lint + format + typecheck + validate)
        run: npm run checks

      - name: Build smoke
        run: npm run build
