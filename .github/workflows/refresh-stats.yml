name: Refresh GitHub stats

# Pulls fresh stars / forks / last-push for every catalog entry once a day and
# commits the result directly to main. No PR — stats are low-risk numeric data
# that nobody needs to review.
#
# When a dedicated bot account exists (e.g. backblaze-b2-bot), set BOT_NAME /
# BOT_EMAIL vars and LABS_DISCOVERY_PAT for API reads. Pushes use GITHUB_TOKEN
# so the workflow can explicitly queue exactly one deploy after committing.

on:
  schedule:
    - cron: "0 7 * * *" # 07:00 UTC daily
  workflow_dispatch:

permissions:
  actions: write
  contents: write

concurrency:
  group: refresh-stats
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ github.token }}

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"

      - run: npm ci

      - name: Sync GitHub stats
        env:
          GH_TOKEN: ${{ secrets.LABS_DISCOVERY_PAT || secrets.GITHUB_TOKEN }}
        run: npm run sync-stats

      - name: Commit and push if changed
        id: commit
        env:
          GIT_AUTHOR_NAME: ${{ vars.BOT_NAME || 'github-actions[bot]' }}
          GIT_AUTHOR_EMAIL: ${{ vars.BOT_EMAIL || '41898282+github-actions[bot]@users.noreply.github.com' }}
        run: |
          if [[ -z "$(git status --porcelain src/data/github-stats.json)" ]]; then
            echo "No changes — nothing to commit."
            echo "committed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git config user.name  "$GIT_AUTHOR_NAME"
          git config user.email "$GIT_AUTHOR_EMAIL"
          git add src/data/github-stats.json
          git commit -m "chore(stats): refresh github-stats.json"
          git push
          echo "committed=true" >> "$GITHUB_OUTPUT"

      - name: Deploy site if stats changed
        if: steps.commit.outputs.committed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run deploy.yml --ref main
