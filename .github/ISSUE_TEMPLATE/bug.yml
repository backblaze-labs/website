name: "Bug report"
description: "Something on the website is broken or wrong."
title: "[Bug] <short summary>"
labels: ["bug", "triage"]
body:
  - type: textarea
    id: what
    attributes:
      label: What happened?
      description: Describe the bug. Include the URL.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: true
  - type: dropdown
    id: theme
    attributes:
      label: Theme
      options: [dark, light, system, "doesn't matter / all"]
    validations:
      required: true
  - type: dropdown
    id: viewport
    attributes:
      label: Viewport
      options: [mobile (≤640px), tablet (641–1024px), desktop (≥1025px), "doesn't matter"]
    validations:
      required: true
  - type: input
    id: browser
    attributes:
      label: Browser + version
      placeholder: "Chrome 121, Safari 17.2, Firefox 122"
  - type: textarea
    id: screenshot
    attributes:
      label: Screenshot
      description: Drag-and-drop here. Optional but very helpful.
